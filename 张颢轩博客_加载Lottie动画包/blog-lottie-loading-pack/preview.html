<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>博客加载 Lottie 预览</title>
<style>
:root {
  --bg:#f5f5f7; --card:rgba(255,255,255,.76); --text:#1d1d1f;
  --sub:#6e6e73; --line:rgba(0,0,0,.08); --accent:#a43b3b;
}
[data-theme="dark"] {
  --bg:#000; --card:rgba(22,22,23,.82); --text:#f5f5f7;
  --sub:#a1a1a6; --line:rgba(255,255,255,.12);
}
* { box-sizing:border-box; }
body {
  margin:0; min-height:100vh; background:var(--bg); color:var(--text);
  font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  transition:background .25s,color .25s;
}
.wrap { width:min(1120px,calc(100% - 32px)); margin:auto; padding:56px 0 72px; }
header { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:28px; }
h1 { margin:0; font-size:clamp(28px,4vw,52px); letter-spacing:-.04em; }
p { color:var(--sub); line-height:1.7; }
button {
  border:1px solid var(--line); background:var(--card); color:var(--text);
  padding:10px 16px; border-radius:999px; cursor:pointer; backdrop-filter:blur(18px);
}
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px; }
.card {
  min-height:520px; padding:28px; border:1px solid var(--line); border-radius:28px;
  background:var(--card); backdrop-filter:blur(24px); box-shadow:0 18px 60px rgba(0,0,0,.06);
  display:flex; flex-direction:column;
}
.meta { display:flex; justify-content:space-between; gap:12px; align-items:start; }
h2 { margin:0 0 8px; font-size:24px; }
.tag { color:var(--accent); font-size:13px; }
.anim { width:min(100%,360px); aspect-ratio:1; margin:auto; }
.actions { display:flex; gap:10px; flex-wrap:wrap; }
small { color:var(--sub); }
@media (max-width:760px) {
  header { align-items:flex-start; flex-direction:column; }
  .grid { grid-template-columns:1fr; }
  .card { min-height:460px; }
}
@media (prefers-reduced-motion:reduce) {
  * { scroll-behavior:auto!important; transition:none!important; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>博客加载动画</h1>
      <p>透明背景、暗红强调、无文字依赖。用于主体内容与图片加载状态。</p>
    </div>
    <button id="theme">切换深浅色</button>
  </header>
  <main class="grid">
    <section class="card">
      <div class="meta">
        <div><h2>页面主体加载</h2><small>Page Content Loading</small></div>
        <span class="tag">3s · Loop</span>
      </div>
      <div id="pageAnim" class="anim"></div>
      <div class="actions">
        <button onclick="pageA.goToAndPlay(0,true)">重新播放</button>
        <button onclick="pageA.pause()">暂停</button>
        <button onclick="pageA.play()">继续</button>
      </div>
    </section>
    <section class="card">
      <div class="meta">
        <div><h2>图片加载</h2><small>Image Loading</small></div>
        <span class="tag">3s · Loop</span>
      </div>
      <div id="imageAnim" class="anim"></div>
      <div class="actions">
        <button onclick="imageA.goToAndPlay(0,true)">重新播放</button>
        <button onclick="imageA.pause()">暂停</button>
        <button onclick="imageA.play()">继续</button>
      </div>
    </section>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
