<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>博客光标与点击效果预览</title>
<style>
:root{--background:#f5f5f7;--surface:#fff;--surface-muted:#ececef;--text-primary:#1d1d1f;--text-secondary:#67676d;--border:rgba(0,0,0,.08);--accent:#8f1d2c;--accent-soft:rgba(143,29,44,.1);--cursor-fill:#141416;--cursor-outline:rgba(255,255,255,.98)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,var(--accent-soft),transparent 34rem),var(--background);color:var(--text-primary);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}header{height:72px;display:flex;align-items:center;justify-content:space-between;max-width:1080px;margin:auto;padding:0 24px}.brand{font-weight:720}.pill{border:1px solid var(--border);padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.7);text-decoration:none;color:inherit}main{max-width:1080px;margin:auto;padding:82px 24px 120px}.eyebrow{color:var(--accent);font-weight:650;font-size:14px}h1{font-size:clamp(46px,8vw,92px);line-height:.98;letter-spacing:-.055em;margin:18px 0 26px;max-width:900px}.lead{font-size:20px;line-height:1.75;color:var(--text-secondary);max-width:720px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin:34px 0 80px}button,a.button{border:0;border-radius:999px;padding:14px 20px;font:inherit;font-weight:650;background:var(--text-primary);color:#fff;text-decoration:none}.secondary{background:var(--surface)!important;color:var(--text-primary)!important;border:1px solid var(--border)!important}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{min-height:220px;padding:24px;border-radius:24px;border:1px solid var(--border);background:var(--surface);box-shadow:0 22px 60px rgba(0,0,0,.06);transition:transform .22s cubic-bezier(.22,1,.36,1)}.card:hover{transform:translateY(-4px)}.card-index{color:var(--accent);font-weight:700}.card h2{font-size:26px;margin:48px 0 12px}.card p{color:var(--text-secondary);line-height:1.7}.input-demo{margin-top:60px;padding:28px;border:1px solid var(--border);background:var(--surface);border-radius:24px}input{width:100%;padding:15px 16px;border-radius:14px;border:1px solid var(--border);background:var(--surface-muted);font:inherit;color:inherit;outline:none;margin-top:12px}input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}.hint{margin-top:14px;color:var(--text-secondary);font-size:14px}
.blog-cursor{position:fixed;top:0;left:0;z-index:2147483646;width:28px;height:38px;pointer-events:none;opacity:0;transform:translate3d(-100px,-100px,0);transition:opacity 120ms ease;will-change:transform}.blog-cursor[data-visible=true]{opacity:1}.blog-cursor[data-mode=hidden]{opacity:0}.blog-cursor__arrow{position:absolute;inset:0;overflow:visible;filter:drop-shadow(0 2px 3px rgba(0,0,0,.24));transform-origin:3px 3px;transition:transform 150ms cubic-bezier(.22,1,.36,1),filter 150ms ease}.blog-cursor__outline{fill:var(--cursor-outline);stroke:var(--cursor-outline);stroke-width:3.1;stroke-linejoin:round}.blog-cursor__fill{fill:var(--cursor-fill);stroke:var(--cursor-fill);stroke-width:1.2;stroke-linejoin:round}.blog-cursor__halo{position:absolute;top:-8px;left:-8px;width:36px;height:36px;border:1px solid color-mix(in srgb,var(--accent) 64%,transparent);border-radius:999px;background:color-mix(in srgb,var(--accent-soft) 75%,transparent);opacity:0;transform:scale(.62);transition:opacity 160ms ease,transform 220ms cubic-bezier(.22,1,.36,1)}.blog-cursor[data-mode=interactive] .blog-cursor__halo{opacity:.95;transform:scale(1)}.blog-cursor[data-mode=interactive] .blog-cursor__arrow{transform:translate3d(1px,1px,0) scale(.94);filter:drop-shadow(0 2px 3px rgba(0,0,0,.24)) drop-shadow(0 0 7px color-mix(in srgb,var(--accent) 34%,transparent))}.blog-cursor[data-pressed=true] .blog-cursor__arrow{transform:translate3d(1px,1px,0) scale(.82)}.blog-cursor[data-pressed=true] .blog-cursor__halo{opacity:.72;transform:scale(.78)}.blog-click-ripple{position:fixed;z-index:2147483645;width:12px;height:12px;pointer-events:none;border:1.5px solid var(--accent);border-radius:999px;background:color-mix(in srgb,var(--accent) 18%,transparent);transform:translate(-50%,-50%) scale(.45);animation:ripple 420ms cubic-bezier(.22,1,.36,1) forwards}.blog-click-ripple:after{content:"";position:absolute;inset:50% auto auto 50%;width:4px;height:4px;border-radius:999px;background:var(--accent);transform:translate(-50%,-50%)}@keyframes ripple{0%{opacity:.92;transform:translate(-50%,-50%) scale(.45)}68%{opacity:.48}100%{opacity:0;transform:translate(-50%,-50%) scale(3.15)}}
@media(hover:hover) and (pointer:fine){html[data-custom-cursor=ready],html[data-custom-cursor=ready] body,html[data-custom-cursor=ready] a,html[data-custom-cursor=ready] button,html[data-custom-cursor=ready] [data-cursor=interactive]{cursor:none!important}html[data-custom-cursor=ready] input{cursor:text!important}}@media(max-width:760px),(hover:none),(pointer:coarse),(prefers-reduced-motion:reduce){.blog-cursor,.blog-click-ripple{display:none!important}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="brand">HZ · Haoxuan Zhang</div><a class="pill" href="#cards">查看交互</a></header>
<main><div class="eyebrow">Cursor Interaction</div><h1>像 macOS 一样自然，像你的博客一样克制。</h1><p class="lead">移动鼠标观察箭头；悬停按钮和卡片时会出现暗红交互圆环；点击时产生一次短促脉冲。输入框仍保留原生文本光标。</p><div class="actions"><button>查看项目</button><button class="secondary">阅读文章</button><a class="button secondary" href="#input">关于我</a></div><section class="grid" id="cards"><article class="card" data-cursor="interactive"><div class="card-index">01</div><h2>精准箭头</h2><p>接近 macOS 的比例、黑色主体和白色描边，热点位于箭头尖端。</p></article><article class="card" data-cursor="interactive"><div class="card-index">02</div><h2>暗红反馈</h2><p>品牌色只用于悬停和点击，不把整支光标做得过分抢眼。</p></article><article class="card" data-cursor="interactive"><div class="card-index">03</div><h2>性能克制</h2><p>requestAnimationFrame 更新位置；移动端与减少动态模式自动关闭。</p></article></section><section class="input-demo" id="input"><label for="demo">输入区域保留系统 I-beam</label><input id="demo" placeholder="在这里输入一些文字"><div class="hint">这样在阅读、复制和编辑文本时不会损害可用性。</div></section></main>
<div class="blog-cursor" data-mode="default" data-visible="false" data-pressed="false" aria-hidden="true"><span class="blog-cursor__halo"></span><svg class="blog-cursor__arrow" width="28" height="38" viewBox="0 0 28 38" fill="none"><path d="M3.7 2.65C2.76 1.72 1.15 2.39 1.15 3.71V33.38C1.15 34.86 3.03 35.48 3.9 34.28L9.22 26.92L13.38 35.12C14.02 36.38 15.56 36.87 16.8 36.21L19.18 34.94C20.4 34.29 20.86 32.78 20.22 31.56L16.13 23.78L24.97 23.23C26.43 23.14 27.01 21.3 25.97 20.28L3.7 2.65Z" class="blog-cursor__outline"/><path d="M3.7 2.65C2.76 1.72 1.15 2.39 1.15 3.71V33.38C1.15 34.86 3.03 35.48 3.9 34.28L9.22 26.92L13.38 35.12C14.02 36.38 15.56 36.87 16.8 36.21L19.18 34.94C20.4 34.29 20.86 32.78 20.22 31.56L16.13 23.78L24.97 23.23C26.43 23.14 27.01 21.3 25.97 20.28L3.7 2.65Z" class="blog-cursor__fill"/></svg></div>
<script>
const cursor=document.querySelector('.blog-cursor'),interactive='a,button,[role=button],label,[data-cursor=interactive]',text='input,textarea,[contenteditable=true],[data-cursor=text]';if(matchMedia('(hover:hover) and (pointer:fine)').matches&&!matchMedia('(prefers-reduced-motion:reduce)').matches){document.documentElement.dataset.customCursor='ready';let x=-100,y=-100,frame=0;const render=()=>{frame=0;cursor.style.transform=`translate3d(${x}px,${y}px,0)`};addEventListener('pointermove',e=>{x=e.clientX;y=e.clientY;cursor.dataset.visible='true';cursor.dataset.mode=e.target.closest(text)?'hidden':e.target.closest(interactive)?'interactive':'default';if(!frame)frame=requestAnimationFrame(render)},{passive:true});addEventListener('pointerdown',e=>{if(e.target.closest(text))return;cursor.dataset.pressed='true';const r=document.createElement('span');r.className='blog-click-ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';document.body.appendChild(r);r.addEventListener('animationend',()=>r.remove(),{once:true})},{passive:true});addEventListener('pointerup',()=>cursor.dataset.pressed='false',{passive:true});document.documentElement.addEventListener('mouseleave',()=>cursor.dataset.visible='false')}
</script>
</body>
</html>
